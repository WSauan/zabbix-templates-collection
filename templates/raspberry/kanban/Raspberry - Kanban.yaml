zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 36bff6c29af64692839d077febfc7079
      name: 'Templates/Network devices'
  templates:
    - uuid: 2d8d6bee4fbc408e92383ff048dda8c0
      template: 'Raspberry - Kanban'
      name: 'Raspberry - Kanban'
      description: |
        ### Monitoramento Avançado de Kiosk Raspberry Pi
                Este template realiza o monitoramento em três camadas:
                1. **Hardware**: Energia (Sub-tensão) e Temperatura (Soft Limit).
                2. **Sistema**: Status do serviço Systemd e processos do navegador.
                3. **Aplicação**: Validação de conteúdo visual via Cenário Web.
        
        **Requisito**: Definir a macro {$URL_KANBAN} no nível do Host.
      templates:
        - name: 'Linux by Zabbix agent for Raspberry'
        - name: 'Raspberry Kiosk SGA'
      groups:
        - name: 'Templates/Network devices'
      items:
        - uuid: 9509a0e3aa90424b93752391152556f2
          name: 'Status do Web Scenario'
          type: DEPENDENT
          key: web.status.mapped
          delay: '0'
          valuemap:
            name: 'Status de Passo Web'
          master_item:
            key: 'web.test.fail[Verificação Visual do Painel Kiosk]'
      httptests:
        - uuid: 7fe6a66e675448ddbcc193598efc8269
          name: 'Verificação Visual do Painel Kiosk'
          steps:
            - name: 'Valida se a pagina esta rodando'
              url: '{$URL_KANBAN}'
              required: '{$TEXTO_VALIDACAO}'
              status_codes: '200'
      macros:
        - macro: '{$TEXTO_VALIDACAO}'
        - macro: '{$URL_KANBAN}'
          description: 'URL específica do painel Kanban para este host.'
      valuemaps:
        - uuid: d597d119b37743fe89a054968db64492
          name: 'Status de Passo Web'
          mappings:
            - value: '0'
              newvalue: '✅ OK / Sucesso'
            - value: '1'
              newvalue: '❌ Erro de Validação (String)'
            - value: '2'
              newvalue: '❌ Falha de Conexão (HTTP Error)'
            - value: '3'
              newvalue: '❌ Timeout'
  triggers:
    - uuid: a123932f1fe44574a17c0fa0a2662585
      expression: 'last(/Raspberry - Kanban/web.test.fail[Verificação Visual do Painel Kiosk])<>0'
      name: 'Aplicação: Conteúdo visual Kanban não detectado em {HOST.NAME}'
      event_name: '{{ITEM.LASTVALUE}.regsub("^1$", "❌ Erro de Validação (String)")}{{ITEM.LASTVALUE}.regsub("^2$", "❌ Falha de Conexão")}{{ITEM.LASTVALUE}.regsub("^3$", "❌ Timeout")}'
      priority: HIGH
      description: 'O Zabbix acessou a página, mas a frase "Internações - Kanban" não foi encontrada. Indica que o navegador pode estar aberto, mas em uma página de erro (ex: 404, erro de banco de dados ou sem conexão).'
      dependencies:
        - name: 'Serviço kiosk.service não esta rodando em {HOST.NAME}'
          expression: 'last(/Raspberry - Kanban/systemd.unit.info[kiosk.service,ActiveState])<>"active"'
